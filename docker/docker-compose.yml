name: finance-tracker

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  nginx:
    restart: unless-stopped
    build:
      context: .
      dockerfile: nginx/Dockerfile
    volumes:
      - ../api:/var/www/html:ro
    ports:
      - "8000:80"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  api:
    restart: unless-stopped
    build:
      context: ../api
      dockerfile: Dockerfile
    volumes:
      - ../api:/var/www/html
      - ../data:/var/www/data
    environment:
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      LOG_CHANNEL: stack_docker
      LOG_LEVEL: debug
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: finance
      DB_USERNAME: finance
      DB_PASSWORD: secret
      BROADCAST_DRIVER: reverb
      REVERB_APP_ID: app-id
      REVERB_APP_KEY: app-key
      REVERB_APP_SECRET: app-secret
      REVERB_HOST: worker
      REVERB_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://nginx/api/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    command: php-fpm -F

  web:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../web:/app
      - ../api:/api
      - web_node_modules:/app/node_modules
    ports:
      - "4001:4001"
    environment:
      VITE_REVERB_APP_KEY: app-key
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8080
      VITE_API_PROXY_TARGET: http://nginx:80
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1024M
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  worker:
    restart: unless-stopped
    build:
      context: ../api
      dockerfile: Dockerfile
    volumes:
      - ../api:/var/www/html
      - ./supervisor/worker.conf:/etc/supervisor/conf.d/worker.conf
    ports:
      - "8080:8080"
    environment:
      CACHE_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      LOG_CHANNEL: stack_worker
      LOG_LEVEL: debug
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: finance
      DB_USERNAME: finance
      DB_PASSWORD: secret
      BROADCAST_DRIVER: reverb
      REVERB_APP_ID: app-id
      REVERB_APP_KEY: app-key
      REVERB_APP_SECRET: app-secret
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    command: supervisord -c /etc/supervisor/conf.d/worker.conf

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
