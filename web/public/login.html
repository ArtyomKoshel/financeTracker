<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Finance Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
    <div class="login-box">
        <h1>Finance Tracker</h1>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
            <div id="errorMessage" class="login-error"></div>
            <p class="login-hint">Демо: demo@local / demo123</p>
        </form>
    </div>
    <script>
        const form = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');
            submitBtn.disabled = true;

            const email = form.elements.email.value;
            const password = form.elements.password.value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                if (!response.ok) {
                    throw new Error('Неверный email или пароль');
                }

                const data = await response.json();
                if (data.success && data.data.token) {
                    localStorage.setItem('auth_token', data.data.token);
                    localStorage.setItem('user_is_admin', data.data.user?.is_admin ? '1' : '0');
                    if (data.data.user && data.data.user.is_admin) {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    throw new Error('Ошибка входа');
                }
            } catch (e) {
                errorMessage.textContent = e.message || 'Ошибка входа';
                errorMessage.classList.add('show');
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
